---
name: Renovate

on:
  pull_request:
    paths:
      - "renovate.json"
      - ".github/workflows/renovate.yaml"
  # trigger renovate post push to maain
  # to give renovate a chance to update their PRs
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log level'
        default: 'info'
        type: choice
        options:
          - info
          - debug
  schedule:
    - cron: "37 9,11 * * 2,4,5"

concurrency:
  group: renovate

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.10
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
          RENOVATE_ALLOWED_UNSAFE_EXECUTIONS: '["bazelModDeps"]'
          RENOVATE_DRY_RUN: ${{ github.event_name == 'pull_request' && 'full' || '' }}
          RENOVATE_REPOSITORIES: '["kiron1/bazel-compile-commands", "kiron1/janitor", "kiron1/proxydetox"]'
